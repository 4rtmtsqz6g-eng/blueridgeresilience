backend:
  name: git-gateway
  branch: main

media_folder: "."
public_folder: "."

# ── HINT shown throughout the CMS ───────────────────────────────────────────
# To make a word italic, wrap it in underscores: _like this_
# To make a word bold,   wrap it in double stars: **like this**
# ────────────────────────────────────────────────────────────────────────────

collections:
  - name: pages
    label: Pages
    files:

      # ── Contact info & hours (shared across every page) ──────────────────
      - name: global
        label: "Contact Info & Hours"
        file: "content/global.json"
        format: json
        fields:
          - { name: address_line1,  label: "Street address",   widget: string }
          - { name: city_state_zip, label: "City, state, zip", widget: string }
          - { name: phone,          label: "Phone number",     widget: string }
          - { name: email,          label: "Email address",    widget: string }
          - { name: hours_days,     label: "Days open",        widget: string }
          - { name: hours_times,    label: "Hours",            widget: string }

      # ── Homepage ─────────────────────────────────────────────────────────
      - name: homepage
        label: "Homepage"
        file: "content/index.json"
        format: json
        fields:
                  - { name: hero_h1,    label: "Hero headline (main text)",      widget: string }
          - { name: hero_h1_em, label: "Hero headline (emphasis word)",  widget: string, hint: "This word appears in the accent color at the end of the headline" }
          - { name: hero_lead,  label: "Hero intro paragraph",           widget: text, hint: "Use _text_ for italic" }
          - { name: change_p1, label: "\"You're not alone\" — paragraph 1", widget: text, hint: "Use _text_ for italic" }
          - { name: change_p2, label: "\"You're not alone\" — paragraph 2", widget: text }
          - { name: closer,    label: "Closing quote block",             widget: text }
          - { name: meet_p1,   label: "Meet Kate — paragraph 1",        widget: text }
          - { name: meet_p2,   label: "Meet Kate — paragraph 2",        widget: text }

      # ── Individual Therapy ────────────────────────────────────────────────
      - name: individual
        label: "Individual Therapy"
        file: "content/individual-therapy.json"
        format: json
        fields:
          - { name: hero_p1,            label: "Hero — paragraph 1",           widget: text }
          - { name: hero_p2,            label: "Hero — paragraph 2",           widget: text }
          - { name: approach_p1,        label: "Approach — paragraph 1",       widget: text, hint: "Use **text** for bold, _text_ for italic" }
          - { name: approach_p2,        label: "Approach — paragraph 2",       widget: text }
          - { name: approach_p3,        label: "Approach — paragraph 3",       widget: text }
          - { name: first_p1,           label: "First session — paragraph 1",  widget: text }
          - { name: first_p2,           label: "First session — paragraph 2",  widget: text }
          - { name: first_p3,           label: "First session — paragraph 3",  widget: text }
          - { name: pullquote,          label: "Pullquote",                    widget: text }
          - { name: telehealth_inperson,label: "In-person card text",          widget: text }
          - { name: telehealth_online,  label: "Telehealth card text",         widget: text }

      # ── Couples Therapy ───────────────────────────────────────────────────
      - name: couples
        label: "Couples Therapy"
        file: "content/couples-therapy.json"
        format: json
        fields:
          - { name: hero_p1,      label: "Hero — paragraph 1",        widget: text }
          - { name: hero_p2,      label: "Hero — paragraph 2",        widget: text }
          - { name: approach_p1,  label: "Approach — paragraph 1",    widget: text }
          - { name: approach_p2,  label: "Approach — paragraph 2",    widget: text }
          - { name: approach_p3,  label: "Approach — paragraph 3",    widget: text }
          - { name: pullquote,    label: "Pullquote",                 widget: text }
          - { name: session_p1,   label: "Session — paragraph 1",     widget: text }
          - { name: session_p2,   label: "Session — paragraph 2",     widget: text }
          - { name: session_p3,   label: "Session — paragraph 3",     widget: text }
          - { name: outcomes_p1,  label: "Outcomes — paragraph 1",    widget: text }
          - { name: outcomes_p2,  label: "Outcomes — paragraph 2",    widget: text }
          - { name: outcomes_p3,  label: "Outcomes — paragraph 3",    widget: text }

      # ── About ─────────────────────────────────────────────────────────────
      - name: about
        label: "About Kate"
        file: "content/about.json"
        format: json
        fields:
          - { name: hero_p,        label: "Hero paragraph",                        widget: text }
          - { name: why_p1,        label: "Why this work — paragraph 1",           widget: text }
          - { name: why_p2,        label: "Why this work — paragraph 2",           widget: text }
          - { name: why_p3,        label: "Why this work — paragraph 3",           widget: text }
          - { name: pullquote,     label: "Pullquote",                             widget: text }
          - { name: how_p1,        label: "My approach — paragraph 1",            widget: text }
          - { name: how_p2,        label: "My approach — paragraph 2",            widget: text, hint: "Use **text** for bold" }
          - { name: how_p3,        label: "My approach — paragraph 3",            widget: text }
          - { name: qualities_p1,  label: "What clients describe — paragraph 1",  widget: text }
          - { name: qualities_p2,  label: "What clients describe — paragraph 2",  widget: text }
          - { name: outside_p1,    label: "About me — paragraph 1",               widget: text }
          - { name: outside_p2,    label: "About me — paragraph 2",               widget: text }

      # ── Rates ─────────────────────────────────────────────────────────────
      - name: rates
        label: "Rates"
        file: "content/rates.json"
        format: json
        fields:
          - { name: individual_rate,    label: "Individual session rate (number only, e.g. 155)", widget: string }
          - { name: couples_rate,       label: "Couples session rate (number only, e.g. 200)",    widget: string }
          - { name: in_network_text,    label: "In-network paragraph",            widget: text }
          - { name: out_of_network_p1,  label: "Out-of-network — paragraph 1",   widget: text }
          - { name: out_of_network_p2,  label: "Out-of-network — paragraph 2",   widget: text }
          - { name: out_of_network_p3,  label: "Out-of-network — paragraph 3",   widget: text }
          - { name: bridge_text,        label: "Bottom call-to-action text",      widget: text }
